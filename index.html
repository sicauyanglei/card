<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>证件照制作工具</title>
  <style>
    /* CSS 将后续步骤填充 */
    /* 基础重置 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* 居中容器 */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    /* 步骤指示器 */
    .step-indicator {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    /* 卡片样式 */
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    /* 按钮样式 */
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    .btn-primary {
      background: #1E5AA8;
      color: white;
    }
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    /* 隐藏类 */
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <h1>证件照制作工具</h1>
    <div id="step-indicator">步骤指示器</div>
    <div id="content"></div>
  </div>


  <!-- JSZip -->
  <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>

  <!-- MediaPipe 加载检测 -->
  <script>
    window.__mediapipeLoaded = false;
    window.addEventListener('load', function() {
      setTimeout(function() {
        if (typeof FaceDetection === 'undefined') {
          console.error('MediaPipe FaceDetection 未加载，请检查网络连接');
          window.__mediapipeLoaded = false;
        } else {
          console.log('MediaPipe FaceDetection 已加载');
          window.__mediapipeLoaded = true;
        }
      }, 1000);
    });
  </script>

  <script>
    // JS 将后续步骤填充

    // 应用状态和步骤管理
    const state = {
      currentStep: 1,          // 1=拍照/选择, 2=检测中, 3=选背景色, 4=生成, 5=预览
      originalImage: null,      // 原始图片（File 对象）
      detectedFace: null,       // 检测到的人脸数据
      processedImage: null,     // 处理后的人像（ImageData）
      selectedBgColor: '#1E5AA8', // 默认蓝底
      photos: {}                // 生成的各种尺寸证件照 { '1寸': canvas, '2寸': canvas, ... }
    };

    function setStep(step) {
      state.currentStep = step;
      render();
    }

    // 基础 render 函数框架
    function render() {
      const content = document.getElementById('content');
      switch (state.currentStep) {
        case 1: content.innerHTML = renderStep1(); break;
        case 2: content.innerHTML = renderStep2(); break;
        case 3: content.innerHTML = renderStep3(); break;
        case 4: content.innerHTML = renderStep4(); break;
        case 5: content.innerHTML = renderStep5(); break;
      }
    }

    // ==================== 步骤 1: 拍照/选择 ====================
    let cameraStream = null;

    function renderStep1() {
      return `
        <div class="card">
          <h2>第一步：上传照片</h2>
          <p>请拍摄或选择一张正面照，确保面部清晰，光线均匀。</p>

          <div class="upload-options" style="display: flex; gap: 20px; justify-content: center; margin: 30px 0;">
            <button class="btn btn-primary" onclick="openCamera()">
              📷 拍照
            </button>
            <button class="btn btn-secondary" onclick="selectFromGallery()">
              📁 从相册选择
            </button>
          </div>

          <input type="file" id="file-input" accept="image/*" class="hidden" onchange="handleFileSelect(event)">
          <video id="camera-video" autoplay class="hidden" style="max-width: 100%;"></video>
          <canvas id="camera-canvas" class="hidden"></canvas>
          <button id="capture-btn" class="btn btn-primary hidden" onclick="capturePhoto()">📸 拍摄</button>

          <div id="preview-area" class="hidden" style="text-align: center; margin-top: 20px;">
            <img id="preview-img" style="max-width: 300px; border-radius: 8px;">
            <div style="margin-top: 15px;">
              <button class="btn btn-secondary" onclick="clearPhoto()">重新选择</button>
              <button class="btn btn-primary" onclick="confirmPhoto()">确认使用</button>
            </div>
          </div>
        </div>
      `;
    }

    async function openCamera() {
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: 1280, height: 720 }
        });
        const video = document.getElementById('camera-video');
        const previewArea = document.getElementById('preview-area');
        const previewImg = document.getElementById('preview-img');
        const captureBtn = document.getElementById('capture-btn');

        video.classList.remove('hidden');
        previewArea.classList.remove('hidden');
        previewImg.classList.add('hidden');
        captureBtn.classList.remove('hidden');

        video.srcObject = cameraStream;
      } catch (err) {
        alert('无法打开相机，请检查权限设置。' + err.message);
      }
    }

    function capturePhoto() {
      const video = document.getElementById('camera-video');
      const canvas = document.getElementById('camera-canvas');
      const previewImg = document.getElementById('preview-img');
      const captureBtn = document.getElementById('capture-btn');

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);

      // 停止相机
      if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
        cameraStream = null;
      }

      // 显示预览
      const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
      previewImg.src = dataUrl;
      video.classList.add('hidden');
      captureBtn.classList.add('hidden');
      previewImg.classList.remove('hidden');

      // 保存到 state
      state.originalImage = dataURLtoFile(dataUrl, 'photo.jpg');
    }

    function selectFromGallery() {
      document.getElementById('file-input').click();
    }

    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;

      state.originalImage = file;

      const reader = new FileReader();
      reader.onload = function(e) {
        const previewImg = document.getElementById('preview-img');
        const previewArea = document.getElementById('preview-area');
        const video = document.getElementById('camera-video');
        const canvas = document.getElementById('camera-canvas');
        const captureBtn = document.getElementById('capture-btn');

        previewImg.src = e.target.result;
        video.classList.add('hidden');
        canvas.classList.add('hidden');
        captureBtn.classList.add('hidden');
        previewArea.classList.remove('hidden');
        previewImg.classList.remove('hidden');
      };
      reader.readAsDataURL(file);
    }

    function dataURLtoFile(dataurl, filename) {
      const arr = dataurl.split(',');
      const mime = arr[0].match(/:(.*?);/)[1];
      const bstr = atob(arr[1]);
      let n = bstr.length;
      const u8arr = new Uint8Array(n);
      while (n--) u8arr[n] = bstr.charCodeAt(n);
      return new File([u8arr], filename, { type: mime });
    }

    function clearPhoto() {
      state.originalImage = null;
      document.getElementById('file-input').value = '';
      document.getElementById('preview-area').classList.add('hidden');
    }

    function confirmPhoto() {
      if (!state.originalImage) {
        alert('请先拍摄或选择照片');
        return;
      }
      setStep(2);
      detectFace();
    }

    // ==================== 步骤 2: 人脸检测中 ====================
    function renderStep2() {
      return `
        <div class="card" style="text-align: center;">
          <h2>第二步：人脸检测</h2>
          <p>正在检测人脸位置，请稍候...</p>
          <div class="spinner" style="width: 40px; height: 40px; border: 4px solid #f0f0f0; border-top: 4px solid #1E5AA8; border-radius: 50%; animation: spin 1s linear infinite; margin: 30px auto;"></div>
          <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
        </div>
      `;
    }

    // ==================== 步骤 3: 选择背景色 ====================
    function renderStep3() {
      return `
        <div class="card">
          <h2>第三步：选择背景色</h2>
          <p>请选择证件照背景颜色</p>

          <div style="display: flex; gap: 30px; justify-content: center; margin: 30px 0;">
            <div class="bg-option" onclick="selectBgColor('#1E5AA8')" style="cursor: pointer; text-align: center;">
              <div style="width: 120px; height: 150px; background: #1E5AA8; border-radius: 8px; border: 3px solid ${state.selectedBgColor === '#1E5AA8' ? '#333' : 'transparent'};"></div>
              <p style="margin-top: 10px;">蓝色背景</p>
            </div>
            <div class="bg-option" onclick="selectBgColor('#FFFFFF')" style="cursor: pointer; text-align: center;">
              <div style="width: 120px; height: 150px; background: #FFFFFF; border-radius: 8px; border: 3px solid ${state.selectedBgColor === '#FFFFFF' ? '#333' : 'transparent'}; box-shadow: 0 0 0 1px #ddd;"></div>
              <p style="margin-top: 10px;">白色背景</p>
            </div>
          </div>

          <div style="text-align: center; margin-top: 20px;">
            <button class="btn btn-secondary" onclick="setStep(1)">上一步</button>
            <button class="btn btn-primary" onclick="generatePhotos()">生成证件照</button>
          </div>
        </div>
      `;
    }

    function selectBgColor(color) {
      state.selectedBgColor = color;
      render();
    }

    // ==================== 证件照尺寸规格（单位px，300dpi）====================
    const PHOTO_SIZES = {
      '一寸': { mm: { width: 25, height: 35 }, px: { width: 295, height: 413 } },
      '二寸': { mm: { width: 35, height: 49 }, px: { width: 413, height: 579 } },
      '小二寸': { mm: { width: 33, height: 48 }, px: { width: 390, height: 567 } }
    };

    // ==================== 步骤 4: 生成中界面 ====================
    function renderStep4() {
      return `
        <div class="card" style="text-align: center;">
          <h2>第四步：生成证件照</h2>
          <p>正在处理照片，请稍候...</p>
          <div class="spinner" style="width: 40px; height: 40px; border: 4px solid #f0f0f0; border-top: 4px solid #1E5AA8; border-radius: 50%; animation: spin 1s linear infinite; margin: 30px auto;"></div>
          <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
        </div>
      `;
    }

    // ==================== 步骤 5: 预览与下载 ====================
function renderStep5() {
  const photosHtml = Object.entries(state.photos).map(([name, canvas]) => `
    <div style="text-align: center; margin: 15px;">
      <h3>${name}</h3>
      <div style="border: 1px solid #ddd; padding: 10px; display: inline-block; background: ${state.selectedBgColor};">
        <img src="${canvas.toDataURL('image/png')}" style="width: 150px; display: block;">
      </div>
      <p style="font-size: 12px; color: #666;">${PHOTO_SIZES[name].mm.width}mm × ${PHOTO_SIZES[name].mm.height}mm</p>
      <button class="btn btn-secondary" style="margin-top: 5px;" onclick="downloadSingle('${name}')">下载 ${name}</button>
    </div>
  `).join('');

  return `
    <div class="card">
      <h2>第五步：预览与下载</h2>
      <p>您的证件照已生成完毕</p>

      <div style="display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin: 20px 0;">
        ${photosHtml}
      </div>

      <div style="text-align: center; margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee;">
        <h3>打印排版</h3>
        <p style="margin: 10px 0;">排版后可直接打印冲印</p>
        <div style="display: flex; gap: 15px; justify-content: center; margin: 15px 0;">
          <button class="btn btn-primary" onclick="generateLayout('a4')">A4 排版下载</button>
          <button class="btn btn-secondary" onclick="generateLayout('6寸')">6寸排版下载</button>
        </div>
        <button class="btn btn-secondary" style="margin-top: 10px;" onclick="downloadAllZip()">打包下载所有尺寸</button>
      </div>

      <div style="text-align: center; margin-top: 20px;">
        <button class="btn btn-secondary" onclick="startOver()">重新制作</button>
      </div>
    </div>
  `;
}

// renderPhotoPreview is an alias for renderStep5
function renderPhotoPreview() {
  return renderStep5();
}

// ==================== 下载单张 ====================
function downloadSingle(name) {
  const canvas = state.photos[name];
  const link = document.createElement('a');
  link.download = `证件照_${name}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// ==================== 打印排版 ====================
function generateLayout(size) {
  // A4: 210mm x 297mm @300dpi = 2480 x 3508 px
  // 6寸: 6" x 4" @300dpi = 1800 x 1200 px

  const layouts = {
    'a4': { width: 2480, height: 3508 },
    '6寸': { width: 1800, height: 1200 }
  };

  const layout = layouts[size];
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = layout.width;
  canvas.height = layout.height;

  // 白色背景
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 计算排版：各尺寸各放几张
  // A4 排版（留边距 10mm = 118px）
  const margin = 118; // 10mm @300dpi
  const availW = canvas.width - 2 * margin;
  const availH = canvas.height - 2 * margin;

  // 每种尺寸各 4 张（A4 一页 12 张）
  let x = margin, y = margin;
  const gap = 40;

  for (const [name, photoCanvas] of Object.entries(state.photos)) {
    const px = photoCanvas.width;
    const py = photoCanvas.height;

    for (let i = 0; i < 4; i++) {
      ctx.drawImage(photoCanvas, x, y, px, py);
      x += px + gap;
      if (x + px > canvas.width - margin) {
        x = margin;
        y += py + gap;
      }
    }
  }

  // 下载
  const link = document.createElement('a');
  link.download = `证件照_${size}_排版.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// ==================== 打包下载 ====================
async function downloadAllZip() {
  const zip = new JSZip();

  for (const [name, canvas] of Object.entries(state.photos)) {
    const dataUrl = canvas.toDataURL('image/png');
    const base64 = dataUrl.split(',')[1];
    zip.file(`证件照_${name}.png`, base64, { base64: true });
  }

  const blob = await zip.generateAsync({ type: 'blob' });
  const link = document.createElement('a');
  link.download = '证件照_全套.zip';
  link.href = URL.createObjectURL(blob);
  link.click();
}

// ==================== 重新开始 ====================
function startOver() {
  state.currentStep = 1;
  state.originalImage = null;
  state.detectedFace = null;
  state.processedImage = null;
  state.croppedImage = null;
  state.photos = {};
  state.selectedBgColor = '#1E5AA8';
  if (cameraStream) {
    cameraStream.getTracks().forEach(track => track.stop());
    cameraStream = null;
  }
  render();
}

    // ==================== 人脸检测 ====================
    async function detectFace() {
      console.log('detectFace 开始执行');

      // 先处理图片（抠图），这样备用方案可以直接用
      try {
        await processImage();
      } catch (err) {
        alert('图片处理失败：' + err.message);
        setStep(1);
        return;
      }

      // 直接使用基于皮肤颜色的检测方案
      useFallbackFaceDetection();
    }

    // 基于皮肤颜色检测人脸区域
    function useFallbackFaceDetection() {
      const canvas = state.processedImage;
      const ctx = canvas.getContext('2d');
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imgData.data;
      const w = canvas.width;
      const h = canvas.height;

      // 扫描皮肤像素
      let skinPixels = [];
      const step = 2; // 减少步进，更密集的采样

      for (let y = 0; y < h; y += step) {
        for (let x = 0; x < w; x += step) {
          const idx = (y * w + x) * 4;
          const r = data[idx];
          const g = data[idx + 1];
          const b = data[idx + 2];

          // YCbCr 判断（扩大范围）
          const cb = 128 - 0.168736 * r - 0.331264 * g + 0.5 * b;
          const cr = 128 + 0.5 * r - 0.418688 * g - 0.081312 * b;
          const isSkin = cb > 70 && cb < 130 && cr > 130 && cr < 180;

          if (isSkin) {
            skinPixels.push({ x, y });
          }
        }
      }

      if (skinPixels.length === 0) {
        // 没找到皮肤色，使用中心区域
        console.warn('未检测到皮肤色，使用中心裁剪');
        state.detectedFace = {
          x: 0.25,
          y: 0.15,
          width: 0.5,
          height: 0.55
        };
      } else {
        // 找到皮肤色块，计算边界
        let minX = w, maxX = 0, minY = h, maxY = 0;

        // 只考虑上半部分的皮肤像素（头部通常在上半部分）
        skinPixels = skinPixels.filter(p => p.y < h * 0.65);

        for (const p of skinPixels) {
          minX = Math.min(minX, p.x);
          maxX = Math.max(maxX, p.x);
          minY = Math.min(minY, p.y);
          maxY = Math.max(maxY, p.y);
        }

        // 确保有合理的区域
        if (maxX <= minX || maxY <= minY) {
          minX = w * 0.25;
          maxX = w * 0.75;
          minY = h * 0.15;
          maxY = h * 0.7;
        }

        // 添加适当边距（头部上方留更多空间）
        const padX = (maxX - minX) * 0.4;
        const padYTop = (maxY - minY) * 0.15;
        const padYBottom = (maxY - minY) * 0.5;

        state.detectedFace = {
          x: Math.max(0, (minX - padX) / w),
          y: Math.max(0, (minY - padYTop) / h),
          width: Math.min(1, (maxX - minX + 2 * padX) / w),
          height: Math.min(1, (maxY - minY + padYTop + padYBottom) / h)
        };
      }

      console.log('人脸区域:', state.detectedFace);
      setStep(3);
    }

    // ==================== 生成各尺寸证件照 ====================
    async function generatePhotos() {
      setStep(4);

      try {
        // 添加超时保护
        const timeout = new Promise((_, reject) => {
          setTimeout(() => reject(new Error('处理超时，请重试')), 30000);
        });

        // 处理图像（抠图+背景替换）
        await Promise.race([processImage(), timeout]);

        // 自动裁剪
        await autoCrop();
      } catch (err) {
        alert('图片处理失败：' + err.message + '，请重试。');
        setStep(1);
        return;
      }

      const croppedCanvas = state.croppedImage;

      // 生成各尺寸
      state.photos = {};

      for (const [name, size] of Object.entries(PHOTO_SIZES)) {
        const photoCanvas = document.createElement('canvas');
        const photoCtx = photoCanvas.getContext('2d');

        photoCanvas.width = size.px.width;
        photoCanvas.height = size.px.height;

        // 绘制证件照（居中填充）
        const srcAspect = croppedCanvas.width / croppedCanvas.height;
        const dstAspect = size.px.width / size.px.height;

        let sx = 0, sy = 0, sw = croppedCanvas.width, sh = croppedCanvas.height;
        let dx = 0, dy = 0, dw = size.px.width, dh = size.px.height;

        if (srcAspect > dstAspect) {
          // 源更宽，按高度对齐，裁剪宽度
          sw = croppedCanvas.height * dstAspect;
          sx = (croppedCanvas.width - sw) / 2;
        } else {
          // 源更高，按宽度对齐，裁剪高度
          sh = croppedCanvas.width / dstAspect;
          sy = (croppedCanvas.height - sh) / 2;
        }

        photoCtx.drawImage(croppedCanvas, sx, sy, sw, sh, dx, dy, dw, dh);
        state.photos[name] = photoCanvas;
      }

      setStep(5);
      renderPhotoPreview();
    }

    // ==================== 图像处理：抠图 + 背景替换 ====================
    async function processImage() {
      return new Promise((resolve, reject) => {
        try {
          const img = new Image();
          const imgSrc = state.originalImage instanceof File
            ? URL.createObjectURL(state.originalImage)
            : state.originalImage;

          img.onload = () => {
            try {
              // 缩放到 500px 在保证质量的同时加快处理
              const maxSize = 500;
              let scale = 1;
              if (img.width > maxSize || img.height > maxSize) {
                scale = maxSize / Math.max(img.width, img.height);
              }

              const w = Math.round(img.width * scale);
              const h = Math.round(img.height * scale);

              const canvas = document.createElement('canvas');
              const ctx = canvas.getContext('2d');
              canvas.width = w;
              canvas.height = h;
              ctx.drawImage(img, 0, 0, w, h);

              const srcImg = ctx.getImageData(0, 0, w, h);
              const bgColor = hexToRgb(state.selectedBgColor);
              const data = srcImg.data;

              // 第一步：检测图片四个角的颜色（假设是背景色）
              const cornerColors = [
                { x: 5, y: 5 },
                { x: w - 5, y: 5 },
                { x: 5, y: h - 5 },
                { x: w - 5, y: h - 5 }
              ];
              const bgSamples = cornerColors.map(p => {
                const idx = (p.y * w + p.x) * 4;
                return { r: data[idx], g: data[idx + 1], b: data[idx + 2] };
              });

              // 取平均作为背景色参考
              const avgBg = {
                r: bgSamples.reduce((s, c) => s + c.r, 0) / 4,
                g: bgSamples.reduce((s, c) => s + c.g, 0) / 4,
                b: bgSamples.reduce((s, c) => s + c.b, 0) / 4
              };

              // 第二步：判断每个像素是否接近背景色
              const isLikeBackground = (r, g, b) => {
                const dist = Math.sqrt(
                  Math.pow(r - avgBg.r, 2) +
                  Math.pow(g - avgBg.g, 2) +
                  Math.pow(b - avgBg.b, 2)
                );
                return dist < 60; // 颜色距离阈值
              };

              // 第三步：皮肤检测（改进的 YCbCr + 饱和度判断）
              const isSkin = (r, g, b) => {
                // YCbCr 判断
                const y = 0.299 * r + 0.587 * g + 0.114 * b;
                const cb = 128 - 0.168736 * r - 0.331264 * g + 0.5 * b;
                const cr = 128 + 0.5 * r - 0.418688 * g - 0.081312 * b;

                // 扩大的皮肤范围
                const skinByCbCr = cb > 70 && cb < 130 && cr > 130 && cr < 180;

                // 饱和度判断（皮肤通常有一定饱和度）
                const max = Math.max(r, g, b);
                const min = Math.min(r, g, b);
                const sat = max === 0 ? 0 : (max - min) / max;

                // 不是太暗也不是太亮
                const notExtreme = y > 40 && y < 235;

                return skinByCbCr && notExtreme && (sat > 0.05 || y > 80);
              };

              // 创建皮肤蒙版
              const mask = new Uint8Array(w * h);
              for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                  const idx = (y * w + x) * 4;
                  const r = data[idx];
                  const g = data[idx + 1];
                  const b = data[idx + 2];

                  if (isSkin(r, g, b)) {
                    mask[y * w + x] = 1;
                  }
                }
              }

              // 第四步：简单的形态学闭操作，填补皮肤区域的小空洞
              // 先膨胀后腐蚀
              const dilate = () => {
                const newMask = new Uint8Array(mask);
                for (let y = 1; y < h - 1; y++) {
                  for (let x = 1; x < w - 1; x++) {
                    if (mask[y * w + x] === 1) {
                      for (let dy = -2; dy <= 2; dy++) {
                        for (let dx = -2; dx <= 2; dx++) {
                          const nx = x + dx;
                          const ny = y + dy;
                          if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
                            newMask[ny * w + nx] = 1;
                          }
                        }
                      }
                    }
                  }
                }
                return newMask;
              };

              const erode = (m) => {
                const newMask = new Uint8Array(m);
                for (let y = 2; y < h - 2; y++) {
                  for (let x = 2; x < w - 2; x++) {
                    if (m[y * w + x] === 1) {
                      let allSkin = true;
                      for (let dy = -2; dy <= 2; dy++) {
                        for (let dx = -2; dx <= 2; dx++) {
                          if (m[(y + dy) * w + (x + dx)] === 0) {
                            allSkin = false;
                            break;
                          }
                        }
                        if (!allSkin) break;
                      }
                      if (!allSkin) newMask[y * w + x] = 0;
                    }
                  }
                }
                return newMask;
              };

              let finalMask = dilate();
              finalMask = dilate(); // 两次膨胀
              finalMask = erode();   // 一次腐蚀
              finalMask = erode();   // 两次腐蚀

              // 第五步：根据蒙版替换背景
              for (let i = 0; i < w * h; i++) {
                const idx = i * 4;
                if (finalMask[i] === 0) {
                  // 不是皮肤，替换成背景色
                  data[idx] = bgColor.r;
                  data[idx + 1] = bgColor.g;
                  data[idx + 2] = bgColor.b;
                }
              }

              ctx.putImageData(srcImg, 0, 0);
              state.processedImage = canvas;
              state.processScale = scale;
              resolve();
            } catch (err) {
              reject(err);
            }
          };

          img.onerror = () => reject(new Error('图片加载失败'));
          img.src = imgSrc;
        } catch (err) {
          reject(err);
        }
      });
    }

    function detectSkinTone(data, width, height) {
      // 简单取中间区域采样皮肤色
      const centerX = Math.floor(width / 2);
      const centerY = Math.floor(height / 2);
      const sampleSize = Math.floor(Math.min(width, height) * 0.1);

      let rSum = 0, gSum = 0, bSum = 0, count = 0;

      for (let dy = -sampleSize; dy < sampleSize; dy += 2) {
        for (let dx = -sampleSize; dx < sampleSize; dx += 2) {
          const x = centerX + dx;
          const y = centerY + dy;
          if (x < 0 || x >= width || y < 0 || y >= height) continue;

          const idx = (y * width + x) * 4;
          const r = data[idx];
          const g = data[idx + 1];
          const b = data[idx + 2];

          if (isSkinPixel(r, g, b)) {
            rSum += r; gSum += g; bSum += b; count++;
          }
        }
      }

      return count > 0
        ? { r: rSum / count, g: gSum / count, b: bSum / count }
        : { r: 200, g: 150, b: 120 };
    }

    function isSkinPixel(r, g, b, refColor) {
      // 基于 YCbCr 色彩空间简化判断
      const y = 0.299 * r + 0.587 * g + 0.114 * b;
      const cb = 128 - 0.168736 * r - 0.331264 * g + 0.5 * b;
      const cr = 128 + 0.5 * r - 0.418688 * g - 0.081312 * b;

      // 皮肤色 Cb 范围: 77-127, Cr 范围: 133-173
      const isSkin = cb > 77 && cb < 127 && cr > 133 && cr < 173;

      // 额外基于距离判断
      if (refColor) {
        const dist = Math.sqrt(
          Math.pow(r - refColor.r, 2) +
          Math.pow(g - refColor.g, 2) +
          Math.pow(b - refColor.b, 2)
        );
        return isSkin || dist < 80;
      }

      return isSkin;
    }

    function hexToRgb(hex) {
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? {
        r: parseInt(result[1], 16),
        g: parseInt(result[2], 16),
        b: parseInt(result[3], 16)
      } : { r: 255, g: 255, b: 255 };
    }

    // ==================== 自动裁剪 ====================
    async function autoCrop() {
      const face = state.detectedFace;
      const scale = state.processScale || 1;
      const srcCanvas = state.processedImage;
      const srcW = srcCanvas.width;
      const srcH = srcCanvas.height;

      // 将人脸坐标转换为处理后图片的坐标
      const faceCenterX = (face.x + face.width / 2) * srcW;
      const faceY = face.y * srcH;
      const faceW = face.width * srcW;
      const faceH = face.height * srcH;

      // 计算裁剪区域：头部占比约 70%
      const headRatio = 0.7;
      const cropH = faceH / headRatio;
      const cropW = cropH * 0.75; // 证件照宽高比约 3:4

      // 裁剪框：面部居中偏上
      let cropX = faceCenterX - cropW / 2;
      let cropY = faceY - cropH * 0.1; // 头顶稍偏上

      // 边界检查
      cropX = Math.max(0, Math.min(cropX, srcW - cropW));
      cropY = Math.max(0, Math.min(cropY, srcH - cropH));

      const finalW = Math.min(cropW, srcW - cropX);
      const finalH = Math.min(cropH, srcH - cropY);

      const cropCanvas = document.createElement('canvas');
      const cropCtx = cropCanvas.getContext('2d');
      cropCanvas.width = finalW;
      cropCanvas.height = finalH;
      cropCtx.drawImage(srcCanvas, cropX, cropY, finalW, finalH, 0, 0, finalW, finalH);

      state.croppedImage = cropCanvas;
      return cropCanvas;
    }

    // 启动
    render();
  </script>
